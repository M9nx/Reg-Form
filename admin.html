<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data:; base-uri 'self'; form-action 'self';">
    <title>Admin - SA Project Teams</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin">
    <div class="container admin-container">
        <div id="auth-section" class="card">
            <div class="card-header">
                <h1>Admin Dashboard</h1>
                <p class="subtitle">Manage System Analysis teams and export submissions</p>
            </div>

            <div class="warning-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span>Use the service role key only on a secure machine. Never expose it publicly.</span>
            </div>

            <div class="form-group">
                <label for="service-key">Service Role Key</label>
                <input type="password" id="service-key" placeholder="Enter your Supabase service role key">
            </div>
            <div class="button-row">
                <button id="connect-btn" class="btn-primary">
                    <span class="btn-text">Connect</span>
                    <svg class="btn-spinner hidden" width="20" height="20" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="32" stroke-linecap="round">
                            <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/>
                        </circle>
                    </svg>
                </button>
            </div>
        </div>

        <div id="dashboard-section" class="hidden">
            <div class="card">
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="total-teams">0</div>
                        <div class="stat-label">Total Teams</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="total-members">0</div>
                        <div class="stat-label">Total Members</div>
                    </div>
                </div>
                <div class="button-row">
                    <button id="refresh-btn" class="btn-secondary">Refresh</button>
                    <button id="export-btn" class="btn-secondary">Export CSV</button>
                    <button id="disconnect-btn" class="btn-secondary">Disconnect</button>
                </div>
            </div>

            <div class="card">
                <h2>Teams</h2>
                <p class="subtitle">Project name with member list</p>
                <div class="table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Project Name</th>
                                <th>Members</th>
                            </tr>
                        </thead>
                        <tbody id="teams-table"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="help-section">
            <a class="btn-secondary" href="https://wa.me/201229732478?text=Hi,%20I%20need%20help" target="_blank" rel="noopener">Having a problem? Chat on WhatsApp</a>
        </div>

        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>
